<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纠纠学字</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff8f0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #e65c00;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* 输入区 */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .input-row input {
      width: 120px;
      padding: 10px 14px;
      font-size: 1.5rem;
      border: 2px solid #ffa040;
      border-radius: 12px;
      outline: none;
      text-align: center;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #e65c00; }
    .input-row button {
      padding: 10px 22px;
      background: linear-gradient(135deg, #ff7e30, #e64c00);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }
    .input-row button:hover { opacity: 0.88; }
    .input-row button:active { transform: scale(0.96); }

    /* 田字格卡片 */
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 6px 32px rgba(230,90,0,0.12);
      padding: 30px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      min-width: 320px;
      max-width: 420px;
      width: 100%;
    }

    /* 田字格容器 */
    .grid-wrap {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* 田字格 SVG 背景 */
    .tian-grid {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #hanzi-target {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* 笔画信息 */
    .stroke-info {
      font-size: 1.3rem;
      color: #e65c00;
      font-weight: bold;
      min-height: 2rem;
      letter-spacing: 2px;
    }

    /* 进度条 */
    .progress-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 280px;
    }
    .stroke-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s;
    }
    .stroke-dot.done { background: #e65c00; }
    .stroke-dot.current { background: #ff9a3c; transform: scale(1.3); }

    /* 控制按钮 */
    .ctrl-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl-btn {
      padding: 9px 20px;
      border: 2px solid #ffa040;
      background: #fff;
      color: #e65c00;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { background: #fff0e5; }
    .ctrl-btn.primary {
      background: linear-gradient(135deg, #ff7e30, #e64c00);
      color: #fff;
      border-color: transparent;
    }
    .ctrl-btn.primary:hover { opacity: 0.88; }

    /* 字信息 */
    .char-info {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .char-info .pinyin {
      font-size: 1.1rem;
      color: #e65c00;
      font-weight: bold;
    }

    /* 提示语 */
    .tip {
      color: #bbb;
      font-size: 0.82rem;
      margin-top: 4px;
    }

    /* 语音状态 */
    .tts-status {
      font-size: 0.85rem;
      color: #aaa;
      min-height: 1.4em;
    }
    .tts-status.speaking { color: #e65c00; }

    /* 完成动画 */
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .finish-pop { animation: pop 0.5s ease; }

    /* ====== 笔画顺序列表区 ====== */
    .stroke-list-section {
      width: 100%;
      background: #fff8f0;
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid #fce0b8;
    }
    .stroke-list-title {
      font-size: 0.85rem;
      color: #e65c00;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .stroke-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stroke-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #fff;
      border: 1.5px solid #ffa040;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #555;
      transition: all 0.3s;
    }
    .stroke-tag .seq {
      font-size: 0.7rem;
      color: #bbb;
      font-weight: bold;
    }
    .stroke-tag.active {
      background: #ff7e30;
      color: #fff;
      border-color: #ff7e30;
      transform: scale(1.08);
    }
    .stroke-tag.done {
      background: #e65c00;
      color: #fff;
      border-color: #e65c00;
    }
    .stroke-tag .seq.active { color: rgba(255,255,255,0.8); }
    .stroke-tag .seq.done { color: rgba(255,255,255,0.7); }

    /* 常用字选择区 */
    .char-picker-section {
      width: 100%;
    }
    .char-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 380px;
      padding: 12px;
      background: #fff8f0;
      border-radius: 12px;
    }
    .char-picker-section-title {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .char-picker .char-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ffa040;
      border-radius: 8px;
      background: #fff;
      font-size: 1.1rem;
      color: #e65c00;
      cursor: pointer;
      transition: all 0.2s;
    }
    .char-picker .char-btn:hover {
      background: #ff7e30;
      color: #fff;
      transform: scale(1.1);
    }
    .char-picker .char-btn.selected {
      background: #e65c00;
      color: #fff;
      border-color: #e65c00;
    }
  </style>
</head>
<body>

<h1>🖌️ 纠纠学字</h1>
<p class="subtitle">跟着笔顺，一步一步写！</p>

<div class="input-row">
  <input type="text" id="charInput" maxlength="1" placeholder="字" value="一" />
  <button onclick="loadChar()">开始学习 ▶</button>
</div>

<div class="card">
  <!-- 田字格 + 汉字 -->
  <div class="grid-wrap">
    <svg class="tian-grid" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="278" height="278" fill="#fffdf7" stroke="#f0c070" stroke-width="2" rx="8"/>
      <line x1="140" y1="1" x2="140" y2="279" stroke="#f0c070" stroke-width="1.5"/>
      <line x1="1" y1="140" x2="279" y2="140" stroke="#f0c070" stroke-width="1.5"/>
      <line x1="1" y1="1" x2="279" y2="279" stroke="#f5daa0" stroke-width="1" stroke-dasharray="6,5"/>
      <line x1="279" y1="1" x2="1" y2="279" stroke="#f5daa0" stroke-width="1" stroke-dasharray="6,5"/>
    </svg>
    <div id="hanzi-target"></div>
  </div>

  <!-- 当前笔画提示 -->
  <div class="stroke-info" id="strokeInfo">准备好了，点击开始！</div>

  <!-- 笔画进度点 -->
  <div class="progress-row" id="progressRow"></div>

  <!-- 字的拼音/信息 -->
  <div class="char-info" id="charInfo"></div>

  <!-- TTS 状态 -->
  <div class="tts-status" id="ttsStatus"></div>

  <!-- 控制按钮 -->
  <div class="ctrl-row">
    <button class="ctrl-btn" onclick="replayAnim()">↺ 重播</button>
    <button class="ctrl-btn primary" onclick="startAnim()">▶ 播放笔顺</button>
    <button class="ctrl-btn" onclick="toggleQuiz()">✏️ 练习模式</button>
  </div>

  <!-- ====== 笔画顺序显示区 ====== -->
  <div class="stroke-list-section">
    <div class="stroke-list-title">📝 笔画顺序</div>
    <div class="stroke-list" id="strokeList">
      <span style="color:#bbb;font-size:0.85rem">加载字后显示笔画顺序</span>
    </div>
  </div>

  <p class="tip">💡 支持输入任意汉字（简体）</p>

  <!-- 常用字选择区 -->
  <div class="char-picker-section">
    <div class="char-picker-section-title">📚 常用字库（点击选择）</div>
    <div class="char-picker" id="charPicker"></div>
  </div>
</div>

<script>
// ============ 拼音表（全覆盖常用字库） ============
const PINYIN_MAP = {
  // 数字
  "一":"yī","二":"èr","三":"sān","四":"sì","五":"wǔ",
  "六":"liù","七":"qī","八":"bā","九":"jiǔ","十":"shí",
  // 人体
  "人":"rén","口":"kǒu","手":"shǒu","目":"mù","耳":"ěr","心":"xīn",
  // 自然
  "水":"shuǐ","火":"huǒ","木":"mù","土":"tǔ","山":"shān",
  "日":"rì","月":"yuè","天":"tiān","地":"dì",
  // 方位/基础
  "大":"dà","小":"xiǎo","上":"shàng","下":"xià","中":"zhōng",
  // 常用
  "好":"hǎo","学":"xué","字":"zì","写":"xiě","笔":"bǐ",
  "画":"huà","顺":"shùn","练":"liàn","习":"xí","看":"kàn",
  // 其他字库
  "田":"tián","力":"lì","刀":"dāo","工":"gōng","士":"shì",
  "千":"qiān","干":"gān","王":"wáng",
  // 本次新增
  "曹":"cáo","卿":"qīng","洛":"luò","洪":"hóng","波":"bō",
  "伍":"wǔ","文":"wén","艳":"yàn","周":"zhōu","顺":"shùn","英":"yīng",
};

// ============ 笔画顺序表（严格按教育部规范） ============
// 参考：《现代汉语通用字笔顺规范》（1997年国家标准）
const STROKE_TABLE = {
  // ——— 数字 ———
  "一": ["横"],
  "二": ["横","横"],
  "三": ["横","横","横"],
  "四": ["竖","横折","撇","竖弯钩","横"],
  // 五：第一笔横，第二笔竖，第三笔横折，第四笔横
  "五": ["横","竖","横折","横"],
  "六": ["点","横","撇","点"],
  "七": ["横","竖弯钩"],
  "八": ["撇","捺"],
  "九": ["撇","横折弯钩"],
  "十": ["横","竖"],

  // ——— 人体 ———
  "人": ["撇","捺"],
  "口": ["竖","横折","横"],
  // 手：撇折（第一笔是弯撇）、横、横、竖钩
  "手": ["撇折","横","横","竖钩"],
  // 目：竖、横折、横、横、横（共5笔）
  "目": ["竖","横折","横","横","横"],
  // 耳：横、竖、竖、横、横、横 = 6笔（注意：第2、3笔是两条竖，非竖横）
  "耳": ["横","竖","竖","横","横","横"],
  // 心：点、卧钩、点、点（共4笔）
  "心": ["点","卧钩","点","点"],

  // ——— 自然 ———
  // 水：横撇、撇、竖钩、点（注意：竖钩在第三笔）
  "水": ["横撇","撇","竖钩","点"],
  // 火：点、撇、撇、捺
  "火": ["点","撇","撇","捺"],
  // 木：横、竖、撇、捺
  "木": ["横","竖","撇","捺"],
  "土": ["横","竖","横"],
  // 山：竖、横折、竖（共3笔）
  "山": ["竖","横折","竖"],
  // 日：竖、横折、横、横（共4笔，第二笔是横折不是横折钩）
  "日": ["竖","横折","横","横"],
  // 月：撇、横折钩、横、横（共4笔）
  "月": ["撇","横折钩","横","横"],
  // 天：横、横、撇、捺（共4笔）
  "天": ["横","横","撇","捺"],
  // 地：土旁（横、竖、提）+ 也（横折钩、竖、竖弯钩）= 6笔
  "地": ["横","竖","提","横折钩","竖","竖弯钩"],

  // ——— 方位 ———
  // 上：竖、短横、长横（先写竖再写横）
  "上": ["竖","短横","横"],
  // 下：横、竖、点
  "下": ["横","竖","点"],
  // 中：竖、横折、横、竖（先写外框，再横，再中竖）
  "中": ["竖","横折","横","竖"],
  // 大：横、撇、捺
  "大": ["横","撇","捺"],
  // 小：竖钩、点、点（竖钩在中间，两侧各一点）
  "小": ["竖钩","点","点"],

  // ——— 常用字 ———
  "田": ["竖","横折","横","竖","横"],
  "力": ["横折钩","撇"],
  "刀": ["撇","横折钩"],
  "工": ["横","竖","横"],
  "士": ["横","竖","横"],
  "千": ["撇","横","竖"],
  "干": ["横","横","竖"],
  "王": ["横","横","竖","横"],

  // 好：女（撇点、撇、提）+ 子（横撇、弯钩、横）= 6笔
  // 注意：女旁第3笔书写形态为"提"，子部第1笔为"横撇"，第2笔为"弯钩"
  "好": ["撇点","撇","提","横撇","弯钩","横"],

  // 学：兴字头（点、点、撇）+ 冖（横钩）+ 子（横撇、竖钩、横）= 8笔
  "学": ["点","点","撇","点","横钩","横撇","竖钩","横"],

  // 字：宀（点、点、横钩）+ 子（横撇、弯钩、横）= 6笔
  "字": ["点","点","横钩","横撇","弯钩","横"],

  // 写：点、横钩、横、竖折折钩、横 = 5笔
  "写": ["点","横钩","横","竖折折钩","横"],

  // 笔：竹字头（撇、横折钩、横、撇、横折钩、横）+ 毛（横、竖弯钩、横、竖弯钩）
  // 笔字共12笔太复杂，简化为笔顺名
  "笔": ["撇","横折钩","横","撇","横折钩","横","横","撇","竖","横","横","竖弯钩"],

  // 画：横折、横折、竖、横（共5笔）
  // 画字：横、竖折横折（田字部分）... 实际8笔
  // 正确: 横折、横折钩、撇折、竖弯钩、横折折... 复杂，提供简化版
  "画": ["横","竖","横折","横","竖","横","横","竖"],

  // 顺：川（撇、竖、竖）+ 页（横、撇、竖、横折、撇、点）= 9笔
  "顺": ["撇","竖","竖","横","撇","竖","横折","撇","点"],

  // 练：纟旁（撇折、撇折、提）+ 东（横、竖、横折折撇、捺、点）= 8笔
  "练": ["撇折","撇折","提","横","竖","横折折撇","捺","点"],

  // 习：横折钩、点、提 = 3笔
  "习": ["横折钩","点","提"],

  // 看：手（横折、横、横、竖钩）+ 目（竖、横折、横、横、横）= 9笔
  // 实际看字：撇、横、竖、横折、横、横折、横、横、横
  "看": ["撇","横","竖","横折","横","横折","横","横","横"],

  // ——— 本次新增字（2026-04-07 纠纠提供） ———

  // 曹：横、竖、横折、横、竖、竖、横、竖、横折、横、横（11笔）
  "曹": ["横","竖","横折","横","竖","竖","横","竖","横折","横","横"],

  // 卿：撇、竖提、撇、横折、横、横、竖提、点、横折钩、竖（10笔）
  "卿": ["撇","竖提","撇","横折","横","横","竖提","点","横折钩","竖"],

  // 洛：点、点、提、撇、横撇、捺、竖、横折、横（9笔）
  "洛": ["点","点","提","撇","横撇","捺","竖","横折","横"],

  // 洪：点、点、提、横、竖、竖、横、撇、点（9笔）
  "洪": ["点","点","提","横","竖","竖","横","撇","点"],

  // 波：点、点、提、横撇、撇、竖、横撇、捺（8笔）
  "波": ["点","点","提","横撇","撇","竖","横撇","捺"],

  // 伍：撇、竖、横、竖、横折、横（6笔）
  "伍": ["撇","竖","横","竖","横折","横"],

  // 文：点、横、撇、捺（4笔）
  "文": ["点","横","撇","捺"],

  // 艳：横、横、横、竖、撇、横撇、横折、竖、横、竖弯钩（10笔）
  "艳": ["横","横","横","竖","撇","横撇","横折","竖","横","竖弯钩"],

  // 周：撇、横折钩、横、竖、横、竖、横折、横（8笔）
  "周": ["撇","横折钩","横","竖","横","竖","横折","横"],

  // 顺：撇、竖、竖、横、撇、竖、横折、撇、点（9笔）
  "顺": ["撇","竖","竖","横","撇","竖","横折","撇","点"],

  // 英：横、竖、竖、竖、横折、横、撇、捺（8笔）
  "英": ["横","竖","竖","竖","横折","横","撇","捺"],
};

// ============ 状态 ============
let writer = null;
let currentChar = "一";
let strokeNames = [];
let strokeCount = 0;
let currentStroke = -1;
let isQuizMode = false;
let animStopped = false;   // 动画停止标志

// ============ TTS ============
let preferredVoice = null;
function initVoice() {
  const voices = window.speechSynthesis.getVoices();
  const preferred = [
    "Microsoft Yaoyao",
    "Microsoft Huihui",
    "Microsoft Kangkang",
    "Ting-Ting",
    "Meijia",
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name));
    if (v) { preferredVoice = v; break; }
  }
  if (!preferredVoice) {
    preferredVoice = voices.find(v => v.lang === "zh-CN" || v.lang === "zh_CN")
                  || voices.find(v => v.lang.startsWith("zh"))
                  || null;
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = initVoice;
  initVoice();
}

// 停止所有语音（切换字时调用）
function stopSpeak() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  const sts = document.getElementById("ttsStatus");
  if (sts) { sts.className = "tts-status"; sts.textContent = ""; }
}

// speak：播报文字，返回预估的播报时长(ms)，同时接受 onEnd 回调
// 采用「预估时长 + onend 双保险」确保跨浏览器兼容
function speak(text, onEnd) {
  const sts = document.getElementById("ttsStatus");
  if (!window.speechSynthesis) {
    sts.textContent = "（浏览器不支持语音）";
    if (onEnd) setTimeout(onEnd, 0);
    return 300;
  }
  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "zh-CN";
  utt.rate = 0.78;   // 偏慢，清晰
  utt.pitch = 1.0;
  utt.volume = 1.0;
  if (preferredVoice) utt.voice = preferredVoice;

  sts.textContent = "🔊 " + text;
  sts.className = "tts-status speaking";

  let ended = false;
  const done = () => {
    if (ended) return;
    ended = true;
    sts.className = "tts-status";
    sts.textContent = "";
    if (onEnd) onEnd();
  };

  // 根据字符数预估时长（每字约 400ms @ rate=0.78），作为保底
  const estimatedMs = Math.max(600, text.length * 420);
  const fallback = setTimeout(done, estimatedMs + 500);
  utt.onend  = () => { clearTimeout(fallback); setTimeout(done, 80); };
  utt.onerror = () => { clearTimeout(fallback); done(); };

  window.speechSynthesis.speak(utt);
  return estimatedMs;
}

// ============ 构建进度点 ============
function buildDots(count) {
  const row = document.getElementById("progressRow");
  row.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const d = document.createElement("div");
    d.className = "stroke-dot";
    d.id = "dot-" + i;
    row.appendChild(d);
  }
}

function setDot(idx, state) {
  const d = document.getElementById("dot-" + idx);
  if (!d) return;
  d.className = "stroke-dot " + (state || "");
}

// ============ 笔画顺序列表 ============
function buildStrokeList(names) {
  const list = document.getElementById("strokeList");
  list.innerHTML = "";
  names.forEach((name, i) => {
    const tag = document.createElement("div");
    tag.className = "stroke-tag";
    tag.id = "stag-" + i;
    tag.innerHTML = `<span class="seq" id="stag-seq-${i}">${i + 1}</span>${name}`;
    list.appendChild(tag);
  });
}

function setStrokeTag(idx, state) {
  const tag = document.getElementById("stag-" + idx);
  const seq = document.getElementById("stag-seq-" + idx);
  if (!tag) return;
  tag.className = "stroke-tag" + (state ? " " + state : "");
  if (seq) seq.className = "seq" + (state ? " " + state : "");
}

// ============ 加载汉字 ============
function loadChar() {
  const input = document.getElementById("charInput").value.trim();
  if (!input || input.length < 1) return;
  const ch = input[0];

  // ★ 立即停止当前语音播报
  stopSpeak();
  animStopped = true;   // 让进行中的动画停止

  currentChar = ch;
  currentStroke = -1;
  isQuizMode = false;
  strokeNames = [];
  document.getElementById("strokeInfo").textContent = "加载中...";
  document.getElementById("progressRow").innerHTML = "";
  document.getElementById("strokeList").innerHTML =
    '<span style="color:#bbb;font-size:0.85rem">加载中...</span>';

  const pinyin = PINYIN_MAP[ch] || "";
  document.getElementById("charInfo").innerHTML =
    `<span class="pinyin">${pinyin || "（拼音暂无）"}</span><br/>共 ? 画`;

  // 高亮选中字按钮
  document.querySelectorAll(".char-btn").forEach(btn => {
    btn.classList.toggle("selected", btn.textContent === ch);
  });

  const target = document.getElementById("hanzi-target");
  target.innerHTML = "";

  try {
    writer = HanziWriter.create("hanzi-target", ch, {
      width: 280,
      height: 280,
      padding: 16,
      showOutline: true,
      outlineColor: "#e8c99a",
      strokeColor: "#c83200",
      strokeAnimationSpeed: 0.35,   // 慢速，让每笔书写时间约 1~1.5 秒
      delayBetweenStrokes: 0,        // 由 animateStroke 自行控制间隔
      strokeFadeDuration: 300,
      radicalColor: "#ff6500",
      onLoadCharDataSuccess: (data) => {
        strokeCount = data.strokes.length;
        buildDots(strokeCount);

        // 解析笔画名：优先 STROKE_TABLE，否则推断
        strokeNames = data.strokes.map((stroke, i) => {
          if (STROKE_TABLE[ch] && i < STROKE_TABLE[ch].length) {
            return STROKE_TABLE[ch][i];
          }
          return inferStrokeName(stroke, data.medians[i]);
        });

        buildStrokeList(strokeNames);

        const py = PINYIN_MAP[ch] || "";
        document.getElementById("charInfo").innerHTML =
          `<span class="pinyin">${py || "（拼音暂无）"}</span><br/>共 ${strokeCount} 画`;
        document.getElementById("strokeInfo").textContent = "点击【播放笔顺】开始！";
      },
      onLoadCharDataError: () => {
        document.getElementById("strokeInfo").textContent = "❌ 暂无该字数据，请换一个字";
        document.getElementById("strokeList").innerHTML =
          '<span style="color:#f00;font-size:0.85rem">暂无笔画数据</span>';
      }
    });
  } catch(e) {
    document.getElementById("strokeInfo").textContent = "❌ 加载失败：" + e.message;
  }
}

// ============ 几何推断笔画名（当 STROKE_TABLE 没有时备用） ============
function inferStrokeName(strokePath, median) {
  if (!median || median.length < 2) return "笔画";

  const start = median[0];
  const end = median[median.length - 1];
  const dx = end[0] - start[0];
  const dy = end[1] - start[1];
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 2) return "点";

  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  let deg = angle < 0 ? angle + 360 : angle;

  let hasTurn = false;
  for (let i = 2; i < median.length; i++) {
    const p1 = median[i - 2], p2 = median[i - 1], p3 = median[i];
    const a1 = Math.atan2(p2[1]-p1[1], p2[0]-p1[0]) * 180 / Math.PI;
    const a2 = Math.atan2(p3[1]-p2[1], p3[0]-p2[0]) * 180 / Math.PI;
    let diff = Math.abs(a2 - a1);
    if (diff > 180) diff = 360 - diff;
    if (diff > 20) { hasTurn = true; break; }
  }

  if (hasTurn) {
    if (Math.abs(dy) > Math.abs(dx)) return "竖钩";
    return "横折";
  }

  if (deg >= 337.5 || deg < 22.5)   return "横";
  if (deg >= 22.5  && deg < 67.5)   return "捺";
  if (deg >= 67.5  && deg < 112.5)  return "竖";
  if (deg >= 112.5 && deg < 157.5)  return "撇";
  if (deg >= 157.5 && deg < 202.5)  return "横";
  if (deg >= 202.5 && deg < 247.5)  return "撇";
  if (deg >= 247.5 && deg < 292.5)  return "竖";
  if (deg >= 292.5 && deg < 337.5)  return "提";
  return "笔画";
}

// ============ 播放笔顺动画 ============
function startAnim() {
  if (!writer) { loadChar(); return; }
  stopSpeak();
  animStopped = false;
  currentStroke = 0;
  writer.hideCharacter({ duration: 0 });
  // 重置所有标记
  for (let i = 0; i < strokeCount; i++) {
    setDot(i, "");
    setStrokeTag(i, "");
  }
  setTimeout(() => animateStroke(0), 50);
}

function animateStroke(idx) {
  if (animStopped) return;

  if (idx >= strokeCount) {
    const pinyin = PINYIN_MAP[currentChar] || "";
    document.getElementById("strokeInfo").innerHTML = `✅ 写完了！共 ${strokeCount} 画`;
    const target = document.getElementById("hanzi-target");
    target.classList.add("finish-pop");
    setTimeout(() => target.classList.remove("finish-pop"), 600);
    if (!animStopped) {
      speak(`${currentChar}，${pinyin ? pinyin + "，" : ""}共${strokeCount}画，写完了！`);
    }
    return;
  }

  setDot(idx, "current");
  for (let i = 0; i < idx; i++) setStrokeTag(i, "done");
  setStrokeTag(idx, "active");

  const sName = strokeNames[idx] || "笔画";
  document.getElementById("strokeInfo").textContent = `第 ${idx + 1} 画：${sName}`;

  // 语音与动画同时启动
  // 用两个 flag 追踪"语音完成"和"动画完成"，两者都完成才进入下一笔
  let voiceDone = false;
  let animDone  = false;

  const tryNext = () => {
    if (animStopped) return;
    if (voiceDone && animDone) {
      setDot(idx, "done");
      setStrokeTag(idx, "done");
      currentStroke = idx + 1;
      setTimeout(() => {
        if (!animStopped) animateStroke(idx + 1);
      }, 250);   // 每笔之间短暂停顿
    }
  };

  // 1. 启动语音
  speak(sName, () => { voiceDone = true; tryNext(); });

  // 2. 同时启动动画（稍微延迟 50ms 让语音先发出第一个音节）
  setTimeout(() => {
    if (animStopped) return;
    writer.animateStroke(idx, {
      onComplete: () => {
        if (animStopped) return;
        animDone = true;
        tryNext();
      }
    });
  }, 50);
}

// ============ 重播 ============
function replayAnim() {
  if (!writer) return;
  stopSpeak();
  animStopped = true;
  writer.hideCharacter({ duration: 300 });
  setTimeout(() => {
    animStopped = false;
    startAnim();
  }, 350);
}

// ============ 练习模式 ============
function toggleQuiz() {
  if (!writer) return;
  isQuizMode = !isQuizMode;
  if (isQuizMode) {
    stopSpeak();
    animStopped = true;
    // 重置所有标记
    for (let i = 0; i < strokeCount; i++) {
      setDot(i, "");
      setStrokeTag(i, "");
    }
    document.getElementById("strokeInfo").textContent = "✏️ 练习模式：用鼠标/手指描写每个笔画";
    writer.quiz({
      onMistake: () => {
        document.getElementById("strokeInfo").textContent = "❌ 画错了，再试试！";
        speak("再试一下");
      },
      onCorrectStroke: (strokeData) => {
        const idx = strokeData.strokeNum;
        const sName = strokeNames[idx] || "笔画";
        setDot(idx, "done");
        setStrokeTag(idx, "done");
        document.getElementById("strokeInfo").textContent = `✅ 第 ${idx + 1} 画 ${sName} 正确！`;
        speak(sName);
      },
      onComplete: () => {
        document.getElementById("strokeInfo").textContent = `🎉 写完了！共 ${strokeCount} 画，真棒！`;
        // 全部标为完成
        for (let i = 0; i < strokeCount; i++) setStrokeTag(i, "done");
        speak(`${currentChar}，写得很棒，共${strokeCount}画！`);
      }
    });
  } else {
    stopSpeak();
    document.getElementById("strokeInfo").textContent = "已退出练习模式";
    loadChar();
  }
}

// ============ 键盘回车触发 ============
document.getElementById("charInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadChar();
});

// ============ 初始加载 ============
window.onload = () => {
  renderCharPicker();
  loadChar();
};

// ============ 渲染常用字选择器 ============
function renderCharPicker() {
  const picker = document.getElementById("charPicker");
  const commonChars = [
    "一二三四五六七八九十",
    "人口手中山水日月天",
    "地大小上下好学",
    "字写笔画练习耳心",
    "木火土目田刀工",
    "士千干王曹卿洛洪",
    "波伍文艳周英顺",
  ];
  picker.innerHTML = commonChars.map(line =>
    Array.from(line).map(ch => {
      const pinyin = PINYIN_MAP[ch] || "";
      return `<div class="char-btn" onclick="selectChar('${ch}')" title="${ch} ${pinyin}">${ch}</div>`;
    }).join("")
  ).join("");
}

function selectChar(ch) {
  document.getElementById("charInput").value = ch;
  loadChar();
}
</script>
